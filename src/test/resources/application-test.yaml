spring:
  datasource:
    url: jdbc:h2:mem:loanapi;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  jackson:
    property-naming-strategy: SNAKE_CASE
  flyway:
    enabled: false
